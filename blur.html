<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ピンボケ・手ブレ判定</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: "Hiragino Sans", "Noto Sans JP", sans-serif; background: #1a1a1a; color: #e8e8e8; min-height: 100vh; padding: 32px 20px; }
  h1 { font-size: 18px; font-weight: 700; margin-bottom: 8px; letter-spacing: 2px; text-align: center; }
  .subtitle { font-size: 12px; color: #888; margin-bottom: 24px; text-align: center; }

  .controls { display: flex; gap: 16px; justify-content: center; margin-bottom: 20px; flex-wrap: wrap; align-items: center; }
  .controls label { font-size: 12px; color: #aaa; display: flex; align-items: center; gap: 6px; }
  .controls input[type="range"] { width: 120px; }
  .controls .val { font-size: 11px; color: #666; width: 28px; }

  .drop-zone { width: 100%; max-width: 900px; min-height: 140px; border: 2px dashed #444; border-radius: 12px; display: flex; align-items: center; justify-content: center; cursor: pointer; transition: border-color 0.2s; margin: 0 auto 24px; }
  .drop-zone:hover, .drop-zone.dragover { border-color: #888; }
  .drop-zone-text { font-size: 14px; color: #666; text-align: center; padding: 32px; }
  input[type="file"] { display: none; }

  .actions { display: flex; gap: 12px; justify-content: center; margin-bottom: 16px; }
  .btn { padding: 10px 28px; border: none; border-radius: 6px; font-size: 13px; font-weight: 700; cursor: pointer; font-family: inherit; }
  .btn-primary { background: #fff; color: #222; }
  .btn-primary:hover { background: #ddd; }
  .btn-secondary { background: #333; color: #fff; border: 1px solid #555; }
  .btn-secondary:hover { background: #444; }
  .btn:disabled { opacity: 0.3; cursor: default; }

  .progress-bar { width: 100%; max-width: 600px; height: 6px; background: #333; border-radius: 3px; margin: 0 auto 20px; overflow: hidden; display: none; }
  .progress-fill { height: 100%; background: #7fe08c; width: 0%; transition: width 0.1s; }

  .summary { text-align: center; margin-bottom: 20px; font-size: 13px; }
  .summary .ok-count { color: #7fe08c; font-weight: 700; }
  .summary .ng-count { color: #e07f7f; font-weight: 700; }

  .filter-tabs { display: flex; gap: 8px; justify-content: center; margin-bottom: 20px; }
  .filter-tab { padding: 6px 16px; border: 1px solid #444; border-radius: 4px; background: #252525; color: #aaa; font-size: 12px; cursor: pointer; font-family: inherit; }
  .filter-tab.active { background: #444; color: #fff; border-color: #666; }

  .image-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 12px; max-width: 1200px; margin: 0 auto; }
  .image-card { background: #252525; border-radius: 8px; overflow: hidden; border: 2px solid #333; position: relative; }
  .image-card.ng { border-color: #e07f7f; }
  .image-card.ok { border-color: #333; }
  .image-card img { width: 100%; aspect-ratio: 1; object-fit: cover; display: block; }
  .image-card-info { padding: 6px 10px; }
  .image-card-name { font-size: 10px; color: #888; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; margin-bottom: 2px; }
  .image-card-score { font-size: 11px; display: flex; justify-content: space-between; align-items: center; }
  .score-bar { flex: 1; height: 4px; background: #333; border-radius: 2px; margin: 0 8px; overflow: hidden; }
  .score-fill { height: 100%; border-radius: 2px; }
  .score-fill.high { background: #7fe08c; }
  .score-fill.mid { background: #e0c97f; }
  .score-fill.low { background: #e07f7f; }
  .badge-ok { color: #7fe08c; font-weight: 700; font-size: 10px; }
  .badge-ng { color: #e07f7f; font-weight: 700; font-size: 10px; }
  .badge-ng-tag { position: absolute; top: 8px; right: 8px; background: rgba(224,80,80,0.9); color: #fff; font-size: 10px; font-weight: 700; padding: 3px 8px; border-radius: 4px; }
</style>
</head>
<body>

<h1>BLUR CHECKER</h1>
<div class="subtitle">ピンボケ・手ブレのある画像を自動判定</div>

<div class="controls">
  <label>判定しきい値 <input type="range" id="threshold" min="5" max="80" value="30"> <span class="val" id="thresholdVal">30</span></label>
  <span style="font-size:11px; color:#555;">← 低いと厳しく / 高いと甘く</span>
</div>

<div class="drop-zone" id="dropZone">
  <div class="drop-zone-text">
    クリックまたはドラッグ＆ドロップで画像をアップロード<br>
    <span style="font-size:11px; color:#555;">100枚以上OK・ブラウザ内で処理（アップロードなし）</span>
  </div>
</div>
<input type="file" id="fileInput" accept="image/*,.heic,.heif" multiple>
<script src="https://cdn.jsdelivr.net/npm/heic2any@0.0.4/dist/heic2any.min.js" async></script>

<div class="progress-bar" id="progressBar"><div class="progress-fill" id="progressFill"></div></div>

<div class="actions">
  <button class="btn btn-secondary" id="btnClear" disabled>全てクリア</button>
</div>

<div class="summary" id="summary"></div>

<div class="filter-tabs" id="filterTabs" style="display:none;">
  <button class="filter-tab active" data-filter="all">すべて</button>
  <button class="filter-tab" data-filter="ng">NG のみ</button>
  <button class="filter-tab" data-filter="ok">OK のみ</button>
</div>

<div class="image-grid" id="imageGrid"></div>

<script>
var entries = [];
var currentFilter = 'all';
var dropZone = document.getElementById('dropZone');
var fileInput = document.getElementById('fileInput');
var grid = document.getElementById('imageGrid');

dropZone.addEventListener('click', function() { fileInput.click(); });
dropZone.addEventListener('dragover', function(e) { e.preventDefault(); dropZone.classList.add('dragover'); });
dropZone.addEventListener('dragleave', function() { dropZone.classList.remove('dragover'); });
dropZone.addEventListener('drop', function(e) { e.preventDefault(); dropZone.classList.remove('dragover'); addFiles(e.dataTransfer.files); });
fileInput.addEventListener('change', function() { addFiles(fileInput.files); fileInput.value = ''; });

document.getElementById('threshold').addEventListener('input', function() {
  document.getElementById('thresholdVal').textContent = this.value;
  renderGrid();
});

document.getElementById('btnClear').addEventListener('click', function() {
  entries = [];
  renderGrid();
  document.getElementById('summary').textContent = '';
  document.getElementById('filterTabs').style.display = 'none';
  document.getElementById('progressBar').style.display = 'none';
});

document.getElementById('filterTabs').addEventListener('click', function(e) {
  if (!e.target.classList.contains('filter-tab')) return;
  document.querySelectorAll('.filter-tab').forEach(function(t) { t.classList.remove('active'); });
  e.target.classList.add('active');
  currentFilter = e.target.dataset.filter;
  renderGrid();
});

function isHeic(file) {
  var name = file.name.toLowerCase();
  return name.endsWith('.heic') || name.endsWith('.heif') || file.type === 'image/heic' || file.type === 'image/heif';
}

function isAcceptable(file) {
  return file.type.startsWith('image/') || isHeic(file) || file.name.toLowerCase().match(/\.(jpg|jpeg|png|gif|webp|bmp|heic|heif)$/);
}

function convertHeic(file) {
  if (typeof heic2any === 'undefined') {
    return Promise.reject('heic2any not loaded');
  }
  return heic2any({ blob: file, toType: 'image/jpeg', quality: 0.9 }).then(function(result) {
    var blob = Array.isArray(result) ? result[0] : result;
    return new File([blob], file.name.replace(/\.heic$|\.heif$/i, '.jpg'), { type: 'image/jpeg' });
  });
}

function addFiles(files) {
  var arr = Array.from(files).filter(isAcceptable);
  if (!arr.length) return;

  var heicFiles = arr.filter(isHeic);
  var normalFiles = arr.filter(function(f) { return !isHeic(f); });

  if (heicFiles.length === 0) {
    processFiles(normalFiles);
    return;
  }

  // Show converting message
  document.getElementById('summary').innerHTML = '<span style="color:#e0c97f;">HEIC変換中... ' + heicFiles.length + '枚</span>';

  // Wait for heic2any to load if needed
  function waitForHeic2any(cb, retries) {
    if (typeof heic2any !== 'undefined') { cb(); return; }
    if (retries <= 0) {
      document.getElementById('summary').innerHTML = '<span style="color:#e07f7f;">HEIC変換ライブラリの読み込みに失敗しました。JPG/PNGで再度お試しください。</span>';
      if (normalFiles.length) processFiles(normalFiles);
      return;
    }
    setTimeout(function() { waitForHeic2any(cb, retries - 1); }, 500);
  }

  waitForHeic2any(function() {
    var convertPromises = heicFiles.map(function(f) {
      return convertHeic(f).catch(function(err) {
        console.warn('HEIC convert failed:', f.name, err);
        return null;
      });
    });

    Promise.all(convertPromises).then(function(converted) {
      var successful = converted.filter(function(f) { return f !== null; });
      var allFiles = normalFiles.concat(successful);
      if (allFiles.length) processFiles(allFiles);
      else document.getElementById('summary').innerHTML = '<span style="color:#e07f7f;">変換に失敗しました</span>';
    });
  }, 10);
}

function processFiles(arr) {

  var bar = document.getElementById('progressBar');
  var fill = document.getElementById('progressFill');
  bar.style.display = 'block';
  fill.style.width = '0%';

  var total = arr.length;
  var done = 0;

  function processNext() {
    if (done >= total) {
      // Sort: NG first, then by score ascending
      entries.sort(function(a, b) { return a.score - b.score; });
      bar.style.display = 'none';
      renderGrid();
      updateSummary();
      document.getElementById('filterTabs').style.display = 'flex';
      return;
    }

    var file = arr[done];
    var img = new Image();
    img.onload = function() {
      var score = calcSharpness(img);
      var thumbUrl = makeThumbnail(img);
      entries.push({ file: file, thumbUrl: thumbUrl, score: score });
      done++;
      fill.style.width = (done / total * 100) + '%';
      // Use setTimeout to avoid blocking UI
      setTimeout(processNext, 0);
    };
    img.onerror = function() {
      done++;
      fill.style.width = (done / total * 100) + '%';
      setTimeout(processNext, 0);
    };
    img.src = URL.createObjectURL(file);
  }

  processNext();
}

function calcSharpness(img) {
  // Downsample for performance
  var maxDim = 512;
  var scale = Math.min(maxDim / img.naturalWidth, maxDim / img.naturalHeight, 1);
  var w = Math.floor(img.naturalWidth * scale);
  var h = Math.floor(img.naturalHeight * scale);

  var c = document.createElement('canvas');
  c.width = w; c.height = h;
  var cx = c.getContext('2d');
  cx.drawImage(img, 0, 0, w, h);

  var imageData = cx.getImageData(0, 0, w, h);
  var data = imageData.data;

  // Convert to grayscale
  var gray = new Float32Array(w * h);
  for (var i = 0; i < w * h; i++) {
    var idx = i * 4;
    gray[i] = 0.299 * data[idx] + 0.587 * data[idx + 1] + 0.114 * data[idx + 2];
  }

  // Laplacian filter
  var laplacian = new Float32Array(w * h);
  var sum = 0;
  var count = 0;
  for (var y = 1; y < h - 1; y++) {
    for (var x = 1; x < w - 1; x++) {
      var val = -4 * gray[y * w + x]
        + gray[(y - 1) * w + x]
        + gray[(y + 1) * w + x]
        + gray[y * w + (x - 1)]
        + gray[y * w + (x + 1)];
      laplacian[y * w + x] = val;
      sum += val;
      count++;
    }
  }

  // Variance of Laplacian
  var mean = sum / count;
  var variance = 0;
  for (var y = 1; y < h - 1; y++) {
    for (var x = 1; x < w - 1; x++) {
      var diff = laplacian[y * w + x] - mean;
      variance += diff * diff;
    }
  }
  variance /= count;

  // Normalize to 0-100 range (roughly)
  return Math.min(100, Math.sqrt(variance) * 0.5);
}

function makeThumbnail(img) {
  var c = document.createElement('canvas');
  var size = 300;
  c.width = size; c.height = size;
  var cx = c.getContext('2d');
  var iw = img.naturalWidth, ih = img.naturalHeight;
  var scale = Math.max(size / iw, size / ih);
  var sw = size / scale, sh = size / scale;
  var sx = (iw - sw) / 2, sy = (ih - sh) / 2;
  cx.drawImage(img, sx, sy, sw, sh, 0, 0, size, size);
  return c.toDataURL('image/jpeg', 0.7);
}

function getThreshold() {
  return parseInt(document.getElementById('threshold').value);
}

function updateSummary() {
  var threshold = getThreshold();
  var okCount = entries.filter(function(e) { return e.score >= threshold; }).length;
  var ngCount = entries.length - okCount;
  document.getElementById('summary').innerHTML =
    entries.length + '枚中　<span class="ok-count">OK: ' + okCount + '枚</span>　<span class="ng-count">NG: ' + ngCount + '枚</span>';
}

function renderGrid() {
  grid.innerHTML = '';
  document.getElementById('btnClear').disabled = entries.length === 0;
  var threshold = getThreshold();
  updateSummary();

  entries.forEach(function(entry) {
    var isNg = entry.score < threshold;
    if (currentFilter === 'ng' && !isNg) return;
    if (currentFilter === 'ok' && isNg) return;

    var card = document.createElement('div');
    card.className = 'image-card ' + (isNg ? 'ng' : 'ok');

    var img = document.createElement('img');
    img.src = entry.thumbUrl;
    card.appendChild(img);

    if (isNg) {
      var tag = document.createElement('div');
      tag.className = 'badge-ng-tag';
      tag.textContent = 'NG';
      card.appendChild(tag);
    }

    var info = document.createElement('div');
    info.className = 'image-card-info';

    var nameDiv = document.createElement('div');
    nameDiv.className = 'image-card-name';
    nameDiv.textContent = entry.file.name;

    var scoreDiv = document.createElement('div');
    scoreDiv.className = 'image-card-score';
    var scoreLabel = document.createElement('span');
    scoreLabel.className = isNg ? 'badge-ng' : 'badge-ok';
    scoreLabel.textContent = Math.round(entry.score);

    var barDiv = document.createElement('div');
    barDiv.className = 'score-bar';
    var fillDiv = document.createElement('div');
    fillDiv.className = 'score-fill ' + (entry.score >= threshold ? 'high' : entry.score >= threshold * 0.6 ? 'mid' : 'low');
    fillDiv.style.width = Math.min(100, entry.score) + '%';
    barDiv.appendChild(fillDiv);

    var badge = document.createElement('span');
    badge.className = isNg ? 'badge-ng' : 'badge-ok';
    badge.textContent = isNg ? 'NG' : 'OK';

    scoreDiv.appendChild(scoreLabel);
    scoreDiv.appendChild(barDiv);
    scoreDiv.appendChild(badge);

    info.appendChild(nameDiv);
    info.appendChild(scoreDiv);
    card.appendChild(info);
    grid.appendChild(card);
  });
}
</script>
</body>
</html>
