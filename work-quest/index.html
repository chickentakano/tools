<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,user-scalable=no,viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="WORK QUEST">
<meta name="theme-color" content="#0a0a1a">
<meta name="robots" content="noindex,nofollow">
<link rel="manifest" href="manifest.json">
<title>WORK QUEST</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--bg:#0a0a1a;--card:#141428;--gold:#ffd700;--gold-dim:#b8960f;--green:#4ade80;--green-bg:#1a2e1a;--text:#e8e8f0;--dim:#8888aa;--border:#2a2a4a;--red:#ff6b6b;--purple:#a855f7}
body{font-family:-apple-system,'Hiragino Sans',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;overflow-x:hidden;-webkit-tap-highlight-color:transparent}
.c{max-width:480px;margin:0 auto;padding:16px;padding-top:calc(16px + env(safe-area-inset-top));padding-bottom:calc(80px + env(safe-area-inset-bottom))}
.hdr{text-align:center;padding:12px 0 8px}
.hdr h1{font-size:20px;font-weight:900;color:var(--gold);letter-spacing:6px;text-shadow:0 0 20px rgba(255,215,0,.4)}
.hdr .sub{font-size:10px;color:var(--dim);margin-top:2px}

/* === RARITY CARD SYSTEM === */
.char{border-radius:16px;padding:16px;margin:12px 0;position:relative;overflow:hidden;transition:all .8s ease}
.char-header{display:flex;align-items:center;gap:8px;margin-bottom:2px;position:relative;z-index:1}
.char.rarity-common{background:linear-gradient(135deg,#1a1a2a,#141428);border:1px solid #3a3a5a}
.char.rarity-common::before{content:'';position:absolute;top:-50%;left:-50%;width:200%;height:200%;background:radial-gradient(circle,rgba(100,100,150,.05) 0%,transparent 70%);animation:shimmer 8s ease-in-out infinite}
.char.rarity-uncommon{background:linear-gradient(135deg,#1a1510,#2a1f14,#1a1510);border:2px solid #CD7F32}
.char.rarity-uncommon::before{content:'';position:absolute;top:-50%;left:-50%;width:200%;height:200%;background:radial-gradient(circle,rgba(205,127,50,.08) 0%,transparent 60%);animation:shimmer 6s ease-in-out infinite}
.char.rarity-rare{background:linear-gradient(135deg,#181820,#1e2030,#181820);border:2px solid #C0C0C0;box-shadow:0 0 20px rgba(192,192,192,.15)}
.char.rarity-rare::before{content:'';position:absolute;top:-100%;left:-100%;width:300%;height:300%;background:conic-gradient(from 0deg,transparent 0%,rgba(192,192,192,.06) 10%,transparent 20%);animation:spin 10s linear infinite}
.char.rarity-epic{background:linear-gradient(135deg,#1a1800,#1e1a08,#1a1800);border:2px solid var(--gold);box-shadow:0 0 30px rgba(255,215,0,.2),inset 0 0 30px rgba(255,215,0,.05)}
.char.rarity-epic::before{content:'';position:absolute;top:-100%;left:-100%;width:300%;height:300%;background:conic-gradient(from 0deg,transparent 0%,rgba(255,215,0,.1) 10%,transparent 20%);animation:spin 6s linear infinite}
.char.rarity-epic::after{content:'';position:absolute;top:0;left:0;right:0;bottom:0;background:linear-gradient(135deg,transparent 40%,rgba(255,215,0,.03) 50%,transparent 60%);animation:holoShift 4s ease-in-out infinite}
.char.rarity-legendary{background:linear-gradient(135deg,#1a1500,#201a05,#18180a);border:2px solid var(--gold);box-shadow:0 0 40px rgba(255,215,0,.25),0 0 80px rgba(255,215,0,.1),inset 0 0 40px rgba(255,215,0,.08)}
.char.rarity-legendary::before{content:'';position:absolute;top:-100%;left:-100%;width:300%;height:300%;background:conic-gradient(from 0deg,rgba(255,215,0,.12),rgba(255,140,0,.08),rgba(255,215,0,.12),transparent,rgba(255,215,0,.12));animation:spin 4s linear infinite}
.char.rarity-legendary::after{content:'';position:absolute;top:0;left:0;right:0;bottom:0;background:linear-gradient(135deg,transparent 30%,rgba(255,200,0,.06) 45%,rgba(255,255,200,.08) 50%,rgba(255,200,0,.06) 55%,transparent 70%);animation:holoShift 3s ease-in-out infinite}
.char.rarity-mythic{background:linear-gradient(135deg,#0f0a1a,#1a0a20,#0a0f1a);border:2px solid transparent;background-clip:padding-box;box-shadow:0 0 50px rgba(168,85,247,.2),0 0 100px rgba(255,215,0,.1)}
.char.rarity-mythic{border-image:linear-gradient(135deg,#ff6b6b,#ffd700,#4ade80,#60a5fa,#a855f7,#ff6b6b) 1}
.char.rarity-mythic::before{content:'';position:absolute;top:-100%;left:-100%;width:300%;height:300%;background:conic-gradient(from 0deg,rgba(255,107,107,.08),rgba(255,215,0,.08),rgba(74,222,128,.08),rgba(96,165,250,.08),rgba(168,85,247,.08),rgba(255,107,107,.08));animation:spin 3s linear infinite}
.char.rarity-mythic::after{content:'';position:absolute;top:0;left:0;right:0;bottom:0;background:linear-gradient(135deg,transparent 20%,rgba(255,107,107,.04) 30%,rgba(255,215,0,.06) 40%,rgba(74,222,128,.06) 50%,rgba(96,165,250,.04) 60%,rgba(168,85,247,.04) 70%,transparent 80%);animation:holoShift 2.5s ease-in-out infinite}
.char.rarity-god{background:linear-gradient(135deg,#0a0515,#150a20,#0a1020,#0a0515);border:3px solid transparent;box-shadow:0 0 60px rgba(255,215,0,.3),0 0 120px rgba(168,85,247,.15),0 0 180px rgba(74,222,128,.1)}
.char.rarity-god{border-image:linear-gradient(var(--god-angle,135deg),#ff6b6b,#ff9a3c,#ffd700,#4ade80,#60a5fa,#a855f7,#ff6b6b) 1}
.char.rarity-god::before{content:'';position:absolute;top:-100%;left:-100%;width:300%;height:300%;background:conic-gradient(from 0deg,rgba(255,107,107,.1),rgba(255,215,0,.1),rgba(74,222,128,.1),rgba(96,165,250,.1),rgba(168,85,247,.1),rgba(255,215,0,.08),rgba(255,107,107,.1));animation:spin 2s linear infinite}
.char.rarity-god::after{content:'';position:absolute;top:0;left:0;right:0;bottom:0;background:linear-gradient(var(--god-angle,135deg),transparent 10%,rgba(255,255,255,.04) 30%,rgba(255,215,0,.08) 50%,rgba(255,255,255,.04) 70%,transparent 90%);animation:holoShift 2s ease-in-out infinite}

@keyframes shimmer{0%,100%{transform:translate(0,0)}50%{transform:translate(20px,20px)}}
@keyframes spin{0%{transform:rotate(0deg)}100%{transform:rotate(360deg)}}
@keyframes holoShift{0%,100%{transform:translateX(-30%)}50%{transform:translateX(30%)}}

.rarity-badge{display:inline-block;font-size:9px;font-weight:700;padding:2px 8px;border-radius:4px;letter-spacing:1px;flex-shrink:0}
.rarity-common .rarity-badge{background:rgba(100,100,150,.2);color:#8888aa}
.rarity-uncommon .rarity-badge{background:rgba(205,127,50,.2);color:#CD7F32}
.rarity-rare .rarity-badge{background:rgba(192,192,192,.2);color:#C0C0C0}
.rarity-epic .rarity-badge{background:rgba(255,215,0,.15);color:var(--gold)}
.rarity-legendary .rarity-badge{background:rgba(255,215,0,.2);color:var(--gold);box-shadow:0 0 10px rgba(255,215,0,.2)}
.rarity-mythic .rarity-badge{background:linear-gradient(90deg,rgba(255,107,107,.15),rgba(168,85,247,.15));color:#e0b0ff}
.rarity-god .rarity-badge{background:linear-gradient(90deg,rgba(255,215,0,.2),rgba(168,85,247,.2));color:#fff;text-shadow:0 0 8px rgba(255,215,0,.5)}

.char .name{font-size:12px;color:var(--dim);position:relative;z-index:1}
.char .gacha-title-line{font-size:11px;color:#e0b0ff;margin-top:4px;position:relative;z-index:1;font-weight:700;padding:2px 8px;background:rgba(168,85,247,.12);border-radius:4px;display:inline-block}
.char .title{font-size:16px;font-weight:900;color:var(--gold);margin:4px 0 8px;position:relative;z-index:1}
.lvl-row{display:flex;align-items:center;gap:8px;position:relative;z-index:1}
.lvl-row .num{font-size:28px;font-weight:900;color:var(--gold);text-shadow:0 0 15px rgba(255,215,0,.4);line-height:1}
.lvl-row .lbl{font-size:11px;color:var(--dim)}
.exp-wrap{margin-top:8px;position:relative;z-index:1}
.exp-lbl{display:flex;justify-content:space-between;font-size:10px;color:var(--dim);margin-bottom:4px}
.exp-bar{width:100%;height:12px;background:var(--green-bg);border-radius:6px;overflow:hidden;border:1px solid #2a4a2a}
.exp-fill{height:100%;background:linear-gradient(90deg,#22c55e,#4ade80,#86efac);border-radius:6px;transition:width 1.2s ease-out;box-shadow:0 0 10px rgba(74,222,128,.4);width:0}
.exp-total{text-align:right;font-size:10px;color:var(--dim);margin-top:3px}

/* Gacha ticket button */
.gacha-ticket-row{display:flex;gap:8px;margin:10px 0;position:relative;z-index:1}
.gacha-ticket-btn{flex:1;padding:10px 14px;background:linear-gradient(135deg,#2a1040,#1a0830);border:1px solid var(--purple);border-radius:10px;color:var(--purple);font-size:13px;font-weight:700;text-align:center;cursor:pointer;transition:all .2s}
.gacha-ticket-btn:active{background:#2a1050;border-color:#c084fc}
.gacha-ticket-btn .ticket-cnt{font-size:18px;font-weight:900;color:#c084fc;margin-right:4px}
.collection-btn{flex:0 0 auto;padding:10px 14px;background:linear-gradient(135deg,#102040,#0a1030);border:1px solid #60a5fa;border-radius:10px;color:#60a5fa;font-size:13px;font-weight:700;cursor:pointer;transition:all .2s}
.collection-btn:active{background:#102050}

.quote{background:linear-gradient(135deg,#1a1028,#0f1a2a);border:1px solid var(--purple);border-radius:12px;padding:18px;margin:12px 0;cursor:pointer;transition:border-color .3s;position:relative}
.quote:active{border-color:var(--gold)}
.quote .ico{font-size:22px;margin-bottom:6px}
.quote .txt{font-size:14px;font-weight:700;line-height:1.7}
.quote .auth{font-size:11px;color:var(--purple);text-align:right;margin-top:6px}
.quote .tap{font-size:9px;color:var(--dim);text-align:center;margin-top:6px}
.quote .mgr{position:absolute;top:12px;right:12px;background:rgba(168,85,247,.2);border:1px solid var(--purple);color:var(--purple);font-size:10px;padding:4px 10px;border-radius:6px;cursor:pointer}
.stats{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;margin:12px 0}
.stat{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:12px 8px;text-align:center}
.stat .v{font-size:24px;font-weight:900;color:var(--gold);margin-bottom:4px}
.stat .l{font-size:9px;color:var(--dim)}
.sec{display:flex;align-items:center;gap:8px;margin:20px 0 10px;padding-bottom:6px;border-bottom:1px solid var(--border)}
.sec h2{font-size:13px;font-weight:700}
.sec .cnt{font-size:10px;color:var(--dim);margin-left:auto}
.add-btn{width:100%;padding:14px;background:linear-gradient(135deg,#1a2a1a,#1a3a2a);border:1px dashed #4ade80;border-radius:10px;color:var(--green);font-size:13px;font-weight:700;cursor:pointer;margin-bottom:8px;transition:background .2s}
.add-btn:active{background:#1a3a2a}

/* === CHEST CANVAS IN TASK LIST === */
.chest-canvas{image-rendering:pixelated;image-rendering:-moz-crisp-edges;image-rendering:crisp-edges;flex-shrink:0;margin-top:2px}

.qi{background:var(--card);border:1px solid var(--border);border-radius:10px;padding:12px 14px;margin-bottom:6px;display:flex;align-items:flex-start;gap:10px;cursor:pointer;transition:background .2s}
.qi:active{background:var(--bg)}
.qi.done{opacity:.5}
.qi .info{flex:1;min-width:0}
.qi .info .t{font-size:12px;font-weight:700;line-height:1.4;margin-bottom:3px}
.qi .meta{display:flex;gap:6px;flex-wrap:wrap}
.qi .tag{font-size:9px;padding:2px 7px;border-radius:4px;background:rgba(255,255,255,.06);color:var(--dim)}
.qi .tag.dl{color:var(--red);background:rgba(255,107,107,.15)}
.qi .xp{font-size:11px;font-weight:900;color:var(--green);flex-shrink:0;margin-top:3px}

/* Modal base */
.modal-bg{display:none;position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,.7);backdrop-filter:blur(4px);z-index:50;justify-content:center;align-items:flex-end}
.modal-bg.open{display:flex}
.modal{background:#1a1a2e;border-radius:20px 20px 0 0;padding:24px 20px;padding-bottom:calc(24px + env(safe-area-inset-bottom));width:100%;max-width:480px;max-height:80vh;overflow-y:auto;animation:slideUp .3s ease-out}
@keyframes slideUp{from{transform:translateY(100%)}to{transform:translateY(0)}}
.modal h3{font-size:16px;font-weight:900;margin-bottom:16px;color:var(--gold)}
.modal .close{position:absolute;top:16px;right:20px;font-size:20px;color:var(--dim);cursor:pointer;background:none;border:none}
.field{margin-bottom:14px}
.field label{font-size:11px;color:var(--dim);display:block;margin-bottom:4px}
.field input,.field textarea{width:100%;padding:12px;background:#0a0a1a;border:1px solid var(--border);border-radius:8px;color:var(--text);font-size:14px;font-family:inherit}
.field input:focus,.field textarea:focus{outline:none;border-color:var(--gold)}
.eff-sel{display:grid;grid-template-columns:1fr 1fr 1fr 1fr 1fr;gap:6px;margin-bottom:14px}
.eff-btn{padding:8px 2px;background:#0a0a1a;border:1px solid var(--border);border-radius:8px;color:var(--dim);font-size:10px;text-align:center;cursor:pointer;transition:all .2s}
.eff-btn.active{border-color:var(--gold);color:var(--gold);background:#1a1a2a}
.eff-btn canvas{display:block;margin:0 auto 4px}
.cat-sel{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:14px}
.cat-btn{padding:8px 14px;background:#0a0a1a;border:1px solid var(--border);border-radius:8px;color:var(--dim);font-size:11px;cursor:pointer;transition:all .2s}
.cat-btn.active{border-color:var(--green);color:var(--green);background:#0a1a0a}
.submit-btn{width:100%;padding:14px;background:linear-gradient(135deg,var(--gold-dim),var(--gold));border:none;border-radius:10px;color:#0a0a1a;font-size:14px;font-weight:900;cursor:pointer}
.submit-btn:active{opacity:.8}
.submit-btn.danger{background:linear-gradient(135deg,#8b0000,var(--red))}
.submit-btn.complete{background:linear-gradient(135deg,#166534,var(--green))}
.toast{position:fixed;top:40%;left:50%;transform:translate(-50%,-50%);font-size:24px;font-weight:900;color:var(--gold);text-shadow:0 0 20px rgba(255,215,0,.6);pointer-events:none;z-index:100;opacity:0}
.toast.show{animation:toastAnim 1.5s ease-out}
@keyframes toastAnim{0%{opacity:1;transform:translate(-50%,-50%) scale(1)}50%{opacity:1;transform:translate(-50%,-70%) scale(1.2)}100%{opacity:0;transform:translate(-50%,-90%) scale(1)}}
.lvlup{position:fixed;top:0;left:0;right:0;bottom:0;background:radial-gradient(circle,rgba(255,215,0,.3),transparent 70%);pointer-events:none;z-index:99;opacity:0}
.lvlup.show{animation:flash 1.5s ease-out}
@keyframes flash{0%{opacity:1}100%{opacity:0}}
.exp-float{position:fixed;pointer-events:none;z-index:101;font-size:20px;font-weight:900;color:var(--green);text-shadow:0 0 10px rgba(74,222,128,.6);opacity:0}
.exp-float.show{animation:expFloat 1.5s ease-out}
@keyframes expFloat{0%{opacity:1;transform:translateY(0)}100%{opacity:0;transform:translateY(-80px)}}
.qlist-item{display:flex;align-items:center;gap:10px;padding:10px;border-bottom:1px solid var(--border)}
.qlist-item .qtxt{flex:1;font-size:12px;line-height:1.4}
.qlist-item .qauth{font-size:10px;color:var(--purple)}
.qlist-item .qdel{background:none;border:1px solid var(--red);color:var(--red);font-size:10px;padding:4px 10px;border-radius:6px;cursor:pointer}
.qlist-item .qdefault{font-size:9px;color:var(--dim)}
.empty{text-align:center;padding:30px;color:var(--dim);font-size:12px}
.footer{text-align:center;padding:20px 0;font-size:9px;color:var(--dim)}

/* === CHEST OPEN OVERLAY === */
.chest-overlay{display:none;position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,.85);backdrop-filter:blur(8px);z-index:150;justify-content:center;align-items:center;flex-direction:column}
.chest-overlay.open{display:flex}
.chest-overlay canvas{image-rendering:pixelated;image-rendering:-moz-crisp-edges;image-rendering:crisp-edges;cursor:pointer}
.chest-overlay .chest-tap-hint{font-size:14px;color:var(--dim);margin-top:16px;animation:chestHintPulse 1.5s ease-in-out infinite}
@keyframes chestHintPulse{0%,100%{opacity:.6}50%{opacity:1}}
.chest-overlay .chest-reward{position:absolute;top:35%;left:50%;transform:translate(-50%,-50%);font-size:28px;font-weight:900;color:var(--green);text-shadow:0 0 20px rgba(74,222,128,.8);pointer-events:none;opacity:0;white-space:nowrap}
.chest-overlay .chest-reward.show{animation:rewardFloat 2s ease-out forwards}
@keyframes rewardFloat{0%{opacity:1;transform:translate(-50%,-50%) scale(1)}40%{opacity:1;transform:translate(-50%,-80%) scale(1.3)}100%{opacity:0;transform:translate(-50%,-120%) scale(1)}}
.chest-overlay .chest-ticket-reward{position:absolute;top:28%;left:50%;transform:translate(-50%,-50%);font-size:22px;font-weight:900;color:#c084fc;text-shadow:0 0 20px rgba(168,85,247,.8);pointer-events:none;opacity:0;white-space:nowrap}
.chest-overlay .chest-ticket-reward.show{animation:rewardFloat 2s ease-out 0.3s forwards}
.chest-gold-flash{position:fixed;top:0;left:0;right:0;bottom:0;pointer-events:none;z-index:151;opacity:0}
.chest-gold-flash.show{animation:goldFlash 2s ease-out}
@keyframes goldFlash{0%{opacity:0}5%{opacity:1;background:radial-gradient(circle,rgba(255,215,0,.6),rgba(255,165,0,.3),transparent 70%)}20%{opacity:1;background:radial-gradient(circle,rgba(255,215,0,.4),transparent 70%)}100%{opacity:0}}
.chest-close-btn{padding:12px 40px;background:rgba(255,255,255,.1);border:1px solid rgba(255,255,255,.2);border-radius:10px;color:var(--text);font-size:14px;font-weight:700;cursor:pointer;margin-top:24px;display:none}
.chest-close-btn:active{background:rgba(255,255,255,.2)}

/* === GACHA SYSTEM STYLES === */
.gacha-modal-bg{display:none;position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,.85);backdrop-filter:blur(8px);z-index:200;justify-content:center;align-items:center;flex-direction:column}
.gacha-modal-bg.open{display:flex}
.gacha-card-container{perspective:800px;width:200px;height:280px;margin-bottom:24px;cursor:pointer}
.gacha-card-inner{width:100%;height:100%;position:relative;transform-style:preserve-3d;transition:transform .8s ease-in-out}
.gacha-card-inner.flipped{transform:rotateY(180deg)}
.gacha-card-front,.gacha-card-back{position:absolute;width:100%;height:100%;border-radius:16px;backface-visibility:hidden;display:flex;justify-content:center;align-items:center;flex-direction:column}
.gacha-card-front{background:linear-gradient(135deg,#2a1050,#1a0830,#2a1050);border:2px solid var(--purple);box-shadow:0 0 30px rgba(168,85,247,.4)}
.gacha-card-front::before{content:'?';font-size:64px;font-weight:900;color:var(--purple);text-shadow:0 0 20px rgba(168,85,247,.6)}
.gacha-card-back{transform:rotateY(180deg);padding:20px;text-align:center;overflow:hidden}
.gacha-card-back .item-name{font-size:18px;font-weight:900;color:var(--text);margin:10px 0 6px;text-shadow:0 0 10px rgba(255,255,255,.3)}
.gacha-card-back .item-type{font-size:11px;color:var(--dim);margin-bottom:4px}
.gacha-card-back .item-rarity-label{font-size:14px;font-weight:900;letter-spacing:2px;margin-bottom:12px}
.gacha-card-back .item-preview{width:100px;height:100px;border-radius:12px;margin:8px auto;border:2px solid rgba(255,255,255,.1);display:flex;justify-content:center;align-items:center;font-size:36px;overflow:hidden}

/* Gacha rarity colors */
.gacha-rarity-n .item-rarity-label{color:#8888aa}
.gacha-rarity-r .item-rarity-label{color:#60a5fa}
.gacha-rarity-sr .item-rarity-label{color:#ffd700}
.gacha-rarity-ssr .item-rarity-label{color:#ff6bff}
.gacha-rarity-n .gacha-card-back{background:linear-gradient(135deg,#1a1a2e,#141428);border:2px solid #3a3a5a}
.gacha-rarity-r .gacha-card-back{background:linear-gradient(135deg,#0a1a3a,#1a2a4a);border:2px solid #60a5fa;box-shadow:0 0 20px rgba(96,165,250,.3)}
.gacha-rarity-sr .gacha-card-back{background:linear-gradient(135deg,#1a1800,#2a2000);border:2px solid var(--gold);box-shadow:0 0 30px rgba(255,215,0,.4)}
.gacha-rarity-ssr .gacha-card-back{background:linear-gradient(135deg,#1a0030,#300050);border:2px solid #ff6bff;box-shadow:0 0 40px rgba(255,107,255,.4)}

.gacha-flash{position:fixed;top:0;left:0;right:0;bottom:0;pointer-events:none;z-index:201;opacity:0}
.gacha-flash.show-ssr{animation:ssrFlash 1.5s ease-out}
@keyframes ssrFlash{0%{opacity:0}5%{opacity:1;background:radial-gradient(circle,rgba(255,107,255,.6),rgba(255,215,0,.3),transparent 70%)}15%{opacity:1;background:radial-gradient(circle,rgba(255,215,0,.6),rgba(74,222,128,.3),transparent 70%)}25%{opacity:1;background:radial-gradient(circle,rgba(96,165,250,.6),rgba(255,107,255,.3),transparent 70%)}35%{opacity:.8;background:radial-gradient(circle,rgba(255,107,107,.4),transparent 70%)}100%{opacity:0}}

// === PIXEL ART: CHEST DRAWING FUNCTIONS ===
// Each function draws a 16x16 pixel art on a canvas at given scale
function drawPixel(ctx, x, y, color, scale) {
  ctx.fillStyle = color;
  ctx.fillRect(x * scale, y * scale, scale, scale);
}

function drawChestQuick(ctx, scale) {
  // 木の宝箱: wooden treasure chest, completely closed
  var s = scale, P = function(x,y,c){drawPixel(ctx,x,y,c,s)}, bx, by;
  // Lid dome (rows 5-7)
  for (bx = 5; bx <= 10; bx++) P(bx, 5, "#b8845c");
  for (bx = 4; bx <= 11; bx++) P(bx, 6, "#a0724a");
  for (bx = 3; bx <= 12; bx++) P(bx, 7, "#8b5e3c");
  P(4, 6, "#b8845c"); P(5, 6, "#b8845c"); P(11, 6, "#7a4e30"); P(12, 7, "#6b4226");
  // Metal band at seam (row 8)
  for (bx = 3; bx <= 12; bx++) P(bx, 8, "#888");
  P(3, 8, "#aaa"); P(12, 8, "#666");
  P(7, 8, "#c0c0c0"); P(8, 8, "#aaa");
  // Body (rows 9-13)
  for (bx = 3; bx <= 12; bx++) for (by = 9; by <= 13; by++) P(bx, by, "#8b5e3c");
  for (by = 9; by <= 12; by++) P(3, by, "#a0724a");
  for (by = 9; by <= 13; by++) P(12, by, "#6b4226");
  for (bx = 3; bx <= 12; bx++) P(bx, 13, "#4a2a10");
  for (bx = 4; bx <= 11; bx++) P(bx, 11, "#7a4e30");
  P(7, 9, "#444"); P(8, 9, "#333");
  P(3, 9, "#999"); P(12, 9, "#555");
  // Feet
  P(4, 14, "#4a2a10"); P(5, 14, "#4a2a10"); P(10, 14, "#4a2a10"); P(11, 14, "#4a2a10");
}

function drawChestShort(ctx, scale) {
  // 鉄の宝箱: iron chest, lid slightly open with golden light peeking
  var s = scale, P = function(x,y,c){drawPixel(ctx,x,y,c,s)}, bx, by;
  // Lid (rows 4-6, raised 1 row)
  for (bx = 5; bx <= 10; bx++) P(bx, 4, "#99aabb");
  for (bx = 4; bx <= 11; bx++) P(bx, 5, "#778899");
  for (bx = 3; bx <= 12; bx++) P(bx, 6, "#667788");
  P(4, 5, "#8899aa"); P(5, 5, "#8899aa"); P(11, 5, "#556677"); P(12, 6, "#445566");
  P(5, 6, "#8899aa"); P(10, 6, "#556677");
  // Golden light gap (row 7)
  for (bx = 5; bx <= 10; bx++) P(bx, 7, "#ffd700");
  P(6, 7, "#ffe44d"); P(7, 7, "#ffe44d"); P(8, 7, "#ffe44d");
  // Metal band (row 8)
  for (bx = 3; bx <= 12; bx++) P(bx, 8, "#8899aa");
  P(3, 8, "#99aabb"); P(12, 8, "#556677");
  P(7, 8, "#c0d0e0"); P(8, 8, "#99aabb");
  // Body (rows 9-13)
  for (bx = 3; bx <= 12; bx++) for (by = 9; by <= 13; by++) P(bx, by, "#667788");
  for (by = 9; by <= 12; by++) P(3, by, "#778899");
  for (by = 9; by <= 13; by++) P(12, by, "#445566");
  for (bx = 3; bx <= 12; bx++) P(bx, 13, "#334455");
  for (bx = 3; bx <= 12; bx++) P(bx, 11, "#778899");
  P(5, 10, "#8899aa"); P(10, 10, "#556677");
  P(5, 12, "#8899aa"); P(10, 12, "#556677");
  P(7, 9, "#334455"); P(8, 9, "#223344");
  // Feet
  P(4, 14, "#334455"); P(5, 14, "#334455"); P(10, 14, "#334455"); P(11, 14, "#334455");
}

function drawChestLong(ctx, scale) {
  // 銀の宝箱: silver chest, open with contents overflowing
  var s = scale, P = function(x,y,c){drawPixel(ctx,x,y,c,s)}, bx, by;

  ctx.fillStyle = "rgba(255,215,0,0.15)";
  ctx.beginPath(); ctx.arc(8*s, 5*s, 5*s, 0, Math.PI*2); ctx.fill();

  for (bx = 4; bx <= 11; bx++) P(bx, 2, "#d0d0e0");
  for (bx = 3; bx <= 12; bx++) P(bx, 3, "#b8b8c8");
  for (bx = 3; bx <= 12; bx++) P(bx, 4, "#a0a0b0");

  P(4, 5, "#ffd700"); P(5, 5, "#ffe44d"); P(6, 5, "#ffd700");
  P(9, 5, "#ffd700"); P(10, 5, "#ffe44d"); P(11, 5, "#daa520");
  P(7, 5, "#ff4444"); P(8, 5, "#4488ff");
  P(5, 6, "#ffe44d"); P(6, 6, "#ffd700"); P(7, 6, "#daa520");
  P(8, 6, "#ffd700"); P(9, 6, "#ffe44d"); P(10, 6, "#ffd700");
  // Golden glow inside (row 7)
  for (bx = 4; bx <= 11; bx++) P(bx, 7, "#ffd700");

  for (bx = 3; bx <= 12; bx++) P(bx, 8, "#c0c0d0");
  P(3, 8, "#d0d0e0"); P(12, 8, "#808098");
  // Body (rows 9-13)
  for (bx = 3; bx <= 12; bx++) for (by = 9; by <= 13; by++) P(bx, by, "#a8a8b8");
  for (by = 9; by <= 12; by++) P(3, by, "#c0c0d0");
  for (by = 9; by <= 13; by++) P(12, by, "#808098");
  for (bx = 3; bx <= 12; bx++) P(bx, 13, "#606078");
  for (bx = 3; bx <= 12; bx++) P(bx, 11, "#c0c0d0");
  P(5, 10, "#e0e0f0"); P(10, 10, "#808098");
  // Spilled coins
  P(2, 14, "#ffd700"); P(3, 14, "#ffe44d"); P(13, 14, "#daa520");
  // Feet
  P(4, 14, "#606078"); P(5, 14, "#606078"); P(10, 14, "#606078"); P(11, 14, "#606078");
}

function drawChestEpic(ctx, scale, frame) {
  // 金の宝箱: gold chest, fully open with treasure explosion
  var s = scale, P = function(x,y,c){drawPixel(ctx,x,y,c,s)}, bx, by;
  // Animated sparkles
  var t = (frame || 0) % 60;
  var sparkColors = ["#fff","#ffd700","#ffe44d","#fff8b0"];
  var sparkles = [{x:2,y:1},{x:6,y:0},{x:9,y:0},{x:13,y:1},{x:4,y:0},{x:11,y:0}];
  var si;
  for (si = 0; si < sparkles.length; si++) {
    var sp = sparkles[si];
    var yOff = ((t + si * 10) % 20) / 5;
    var sy = Math.round(sp.y - yOff);
    if (sy >= 0 && sy < 16) {
      ctx.globalAlpha = 1 - yOff / 4;
      P(sp.x, sy, sparkColors[si % 4]);
    }
  }
  ctx.globalAlpha = 1;
  // Big glow
  ctx.fillStyle = "rgba(255,215,0,0.2)";
  ctx.beginPath(); ctx.arc(8*s, 5*s, 6*s, 0, Math.PI*2); ctx.fill();
  // Lid way back (rows 1-3)
  for (bx = 4; bx <= 11; bx++) P(bx, 1, "#ffe44d");
  for (bx = 3; bx <= 12; bx++) P(bx, 2, "#ffd700");
  for (bx = 3; bx <= 12; bx++) P(bx, 3, "#daa520");
  P(4, 1, "#fff8b0"); P(5, 1, "#fff8b0"); P(12, 2, "#b8860b"); P(12, 3, "#8b6914");
  // Flying treasure (rows 3-5)
  P(4, 4, "#ffd700"); P(5, 3, "#ffe44d"); P(10, 3, "#daa520"); P(11, 4, "#ffd700");
  P(6, 4, "#44ff44"); P(7, 3, "#ff4444"); P(8, 3, "#4488ff"); P(9, 4, "#ff44ff");
  // Glow cone (rows 5-7)
  for (bx = 4; bx <= 11; bx++) P(bx, 5, "#ffe44d");
  P(6, 5, "#fffacd"); P(7, 5, "#fffacd"); P(8, 5, "#fffacd"); P(9, 5, "#fffacd");
  for (bx = 4; bx <= 11; bx++) P(bx, 6, "#ffd700");
  P(6, 6, "#ffe44d"); P(7, 6, "#ffe44d"); P(8, 6, "#ffe44d"); P(9, 6, "#ffe44d");
  for (bx = 4; bx <= 11; bx++) P(bx, 7, "#daa520");
  P(5, 7, "#ffd700"); P(10, 7, "#ffd700");
  // Band (row 8)
  for (bx = 3; bx <= 12; bx++) P(bx, 8, "#ffe44d");
  P(3, 8, "#fff8b0"); P(12, 8, "#b8860b");
  // Body (rows 9-13)
  for (bx = 3; bx <= 12; bx++) for (by = 9; by <= 13; by++) P(bx, by, "#daa520");
  for (by = 9; by <= 12; by++) P(3, by, "#ffd700");
  for (by = 9; by <= 13; by++) P(12, by, "#b8860b");
  for (bx = 3; bx <= 12; bx++) P(bx, 13, "#8b6914");
  for (bx = 3; bx <= 12; bx++) P(bx, 11, "#ffe44d");
  P(5, 10, "#ff4444"); P(10, 10, "#4488ff");
  P(5, 12, "#44ff44"); P(10, 12, "#ff44ff");
  // Scattered treasure at base
  P(1, 14, "#ffd700"); P(2, 14, "#ffe44d"); P(13, 14, "#ffd700"); P(14, 14, "#daa520");
  P(2, 15, "#ff4444"); P(13, 15, "#4488ff");
  // Feet
  P(4, 14, "#8b6914"); P(5, 14, "#8b6914"); P(10, 14, "#8b6914"); P(11, 14, "#8b6914");
}

// Draw open chest (lid flipped up) for chest-open animation
function drawChestOpen(ctx, scale, type) {
  var s = scale, P = function(x,y,c){drawPixel(ctx,x,y,c,s)}, bx, by;
  var colors = {
    quick:  {lid:"#b8845c",body:"#8b5e3c",light:"#a0724a",dark:"#6b4226",bottom:"#4a2a10"},
    short:  {lid:"#99aabb",body:"#667788",light:"#778899",dark:"#445566",bottom:"#334455"},
    medium: {lid:"#e8a86a",body:"#b87333",light:"#cd7f32",dark:"#8b5a2b",bottom:"#6b4020"},
    long:   {lid:"#d0d0e0",body:"#a8a8b8",light:"#c0c0d0",dark:"#808098",bottom:"#606078"},
    epic:   {lid:"#ffe44d",body:"#daa520",light:"#ffd700",dark:"#b8860b",bottom:"#8b6914"}
  };
  var c = colors[type] || colors.medium;
  // Golden glow
  ctx.fillStyle = "rgba(255,215,0,0.25)";
  ctx.beginPath(); ctx.arc(8*s, 6*s, 5*s, 0, Math.PI*2); ctx.fill();
  // Lid tilted way back (rows 1-3)
  for (bx = 4; bx <= 11; bx++) P(bx, 1, c.lid);
  for (bx = 3; bx <= 12; bx++) P(bx, 2, c.light);
  for (bx = 3; bx <= 12; bx++) P(bx, 3, c.dark);
  // Inner dark + glow (rows 4-7)
  for (bx = 4; bx <= 11; bx++) for (by = 4; by <= 6; by++) P(bx, by, "#1a1a2a");
  for (bx = 5; bx <= 10; bx++) P(bx, 5, "#ffd700");
  for (bx = 6; bx <= 9; bx++) P(bx, 4, "#ffe44d");
  for (bx = 4; bx <= 11; bx++) P(bx, 7, "#daa520");
  // Side walls
  P(3, 4, c.body); P(3, 5, c.body); P(3, 6, c.light);
  P(12, 4, c.dark); P(12, 5, c.dark); P(12, 6, c.dark);
  // Band (row 8)
  for (bx = 3; bx <= 12; bx++) P(bx, 8, c.light);
  // Body (rows 9-13)
  for (bx = 3; bx <= 12; bx++) for (by = 9; by <= 13; by++) P(bx, by, c.body);
  for (by = 9; by <= 12; by++) P(3, by, c.light);
  for (by = 9; by <= 13; by++) P(12, by, c.dark);
  for (bx = 3; bx <= 12; bx++) P(bx, 13, c.bottom);
  // Shadow
  for (bx = 3; bx <= 12; bx++) P(bx, 14, "#0a0a1a");
}

}

function drawSceneSunset(ctx,W,H){
  function R(x,y,w,h,c){ctx.fillStyle=c;ctx.fillRect(x,y,w,h)}

  var sx=60,sy=18,sr=9;

    R(b[0],H-b[2],b[1],1,'#351550');

function roundRectPath(ctx,x,y,w,h,r){
  ctx.beginPath();ctx.moveTo(x+r,y);ctx.lineTo(x+w-r,y);ctx.quadraticCurveTo(x+w,y,x+w,y+r);
  ctx.lineTo(x+w,y+h-r);ctx.quadraticCurveTo(x+w,y+h,x+w-r,y+h);ctx.lineTo(x+r,y+h);
  ctx.quadraticCurveTo(x,y+h,x,y+h-r);ctx.lineTo(x,y+r);ctx.quadraticCurveTo(x,y,x+r,y);ctx.closePath();
}
function saveProfileImage(){
  // DOMの実際の位置を読み取って描画（ゲーム画面と完全一致）
  var card=document.getElementById('charCard');
  var cR=card.getBoundingClientRect();
  var font='-apple-system,Hiragino Sans,sans-serif';
  var xp=totalExp(),lv=calcLevel(xp),p=expProgress(lv,xp);
  var rarity=getRarity(lv),eq=getEquipped();

  function pos(el){var r=el.getBoundingClientRect();return{x:r.left-cR.left,y:r.top-cR.top,w:r.width,h:r.height}}

  // 画像サイズ: カード＋統計行＋フッター
  var expTotalEl=document.getElementById('expTotal');
  var etp=pos(expTotalEl);
  var contentBottom=etp.y+etp.h+6;
  var W=Math.round(cR.width),H=Math.round(contentBottom+70);
  var dpr=2;
  var c=document.createElement('canvas');c.width=W*dpr;c.height=H*dpr;
  var ctx=c.getContext('2d');ctx.scale(dpr,dpr);

  ctx.save();roundRectPath(ctx,0,0,W,H,16);ctx.clip();

  // Rarity background
  var rg={'rarity-common':['#1a1a2a','#141428'],'rarity-uncommon':['#1a1510','#2a1f14'],'rarity-rare':['#181820','#1e2030'],'rarity-epic':['#1a1800','#1e1a08'],'rarity-legendary':['#1a1500','#201a05'],'rarity-mythic':['#0f0a1a','#1a0a20'],'rarity-god':['#0a0515','#150a20']};
  var gc=rg[rarity.cls]||rg['rarity-common'];
  var g=ctx.createLinearGradient(0,0,W,H);g.addColorStop(0,gc[0]);g.addColorStop(1,gc[1]);
  ctx.fillStyle=g;ctx.fillRect(0,0,W,H);

  // Background scene
  if(eq.bg){var bgI=getGachaItemById(eq.bg);if(bgI&&bgI.cls){var fn=null;
    if(bgI.cls==='bg-morning-desk')fn=drawSceneMorning;else if(bgI.cls==='bg-cafe')fn=drawSceneCafe;
    else if(bgI.cls==='bg-sunset-delivery')fn=drawSceneSunset;else if(bgI.cls==='bg-rooftop')fn=drawSceneRooftop;
    else if(bgI.cls==='bg-meeting')fn=drawSceneMeeting;else if(bgI.cls==='bg-late-office')fn=drawSceneLateOffice;
    else if(bgI.cls==='bg-tower-night')fn=drawSceneTowerNight;
    if(fn){var sc=document.createElement('canvas');sc.width=80;sc.height=50;fn(sc.getContext('2d'),80,50);
      ctx.globalAlpha=0.3;ctx.imageSmoothingEnabled=false;ctx.drawImage(sc,0,0,W,H);ctx.imageSmoothingEnabled=true;ctx.globalAlpha=1}
  }}

  // Dark overlay
  var dg=ctx.createLinearGradient(0,0,0,H);dg.addColorStop(0,'rgba(0,0,0,0.25)');dg.addColorStop(0.5,'rgba(0,0,0,0.05)');dg.addColorStop(1,'rgba(0,0,0,0.3)');
  ctx.fillStyle=dg;ctx.fillRect(0,0,W,H);

  // Border
  var bCol='#3a3a5a',bW=1;
  if(rarity.cls==='rarity-god'||rarity.cls==='rarity-legendary'||rarity.cls==='rarity-epic'){bCol='#ffd700';bW=2}
  else if(rarity.cls==='rarity-mythic'){bCol='#a855f7';bW=2}
  else if(rarity.cls==='rarity-rare'){bCol='#C0C0C0';bW=2}
  else if(rarity.cls==='rarity-uncommon'){bCol='#CD7F32';bW=2}
  if(eq.frame){var fi=getGachaItemById(eq.frame);if(fi){
    if(fi.cls==='frame-mvp'){bCol='#ff6b6b';bW=3}else if(fi.cls==='frame-meishi'){bCol='#ffffff';bW=3}
    else if(fi.cls==='frame-ceo'||fi.cls==='frame-trophy'){bCol='#ffd700';bW=3}
    else if(fi.cls==='frame-stamp'){bCol='#e74c3c';bW=3}
    else if(fi.cls==='frame-desklight'){bCol='#ff8c42';bW=2}else if(fi.cls==='frame-bluelight'){bCol='#60a5fa';bW=2}
  }}
  ctx.strokeStyle=bCol;ctx.lineWidth=bW;roundRectPath(ctx,bW/2,bW/2,W-bW,H-bW,15);ctx.stroke();
  if(bW>=2){ctx.shadowColor=bCol;ctx.shadowBlur=20;roundRectPath(ctx,bW/2,bW/2,W-bW,H-bW,15);ctx.stroke();ctx.shadowBlur=0}

  // === DOMの位置を読み取ってテキスト描画 ===
  var bc2={'rarity-common':'#8888aa','rarity-uncommon':'#CD7F32','rarity-rare':'#C0C0C0','rarity-epic':'#ffd700','rarity-legendary':'#ffd700','rarity-mythic':'#e0b0ff','rarity-god':'#ffffff'};
  ctx.textBaseline='middle';

  // Badge
  var badgeEl=document.getElementById('rarityBadge');var bp=pos(badgeEl);
  ctx.fillStyle='rgba(0,0,0,0.35)';roundRectPath(ctx,bp.x-2,bp.y-1,bp.w+4,bp.h+2,4);ctx.fill();
  ctx.fillStyle=bc2[rarity.cls]||'#8888aa';ctx.font='bold 9px '+font;ctx.fillText(badgeEl.textContent,bp.x+2,bp.y+bp.h/2);

  // Name
  var nameEl=document.getElementById('playerName');var np=pos(nameEl);
  ctx.fillStyle='#8888aa';ctx.font='12px '+font;ctx.fillText(nameEl.textContent,np.x,np.y+np.h/2);

  // Gacha title
  var gtEl=document.getElementById('gachaTitleLine');
  if(gtEl.offsetHeight>0&&gtEl.style.display!=='none'){var gp=pos(gtEl);
    ctx.fillStyle='rgba(168,85,247,0.12)';roundRectPath(ctx,gp.x,gp.y,gp.w,gp.h,4);ctx.fill();
    ctx.fillStyle='#e0b0ff';ctx.font='bold 11px '+font;ctx.fillText(gtEl.textContent,gp.x+8,gp.y+gp.h/2);

  ctx.shadowColor='rgba(255,215,0,0.4)';ctx.shadowBlur=10;ctx.fillText(titleEl.textContent,tp.x,tp.y+tp.h/2);ctx.shadowBlur=0;

  // Level
  var lvLblEl=document.querySelector('.lvl-row .lbl');var lvNumEl=document.getElementById('levelNum');
  var llp=pos(lvLblEl),lnp=pos(lvNumEl);
  ctx.fillStyle='#8888aa';ctx.font='11px '+font;ctx.fillText('Lv.',llp.x,llp.y+llp.h/2);
  ctx.fillStyle='#ffd700';ctx.font='bold 28px '+font;
  ctx.shadowColor='rgba(255,215,0,0.4)';ctx.shadowBlur=15;ctx.fillText(String(lv),lnp.x,lnp.y+lnp.h/2);ctx.shadowBlur=0;

  // EXP label
  var expLblEl=document.querySelector('.exp-lbl');var elp=pos(expLblEl);
  ctx.fillStyle='#8888aa';ctx.font='10px '+font;ctx.fillText('EXP',elp.x,elp.y+elp.h/2);
  ctx.textAlign='right';ctx.fillText(p.inLv+' / '+p.need,elp.x+elp.w,elp.y+elp.h/2);ctx.textAlign='left';

  // EXP bar
  var barEl=document.querySelector('.exp-bar');var barP=pos(barEl);
  roundRectPath(ctx,barP.x,barP.y,barP.w,barP.h,6);ctx.fillStyle='#1a2e1a';ctx.fill();
  ctx.strokeStyle='#2a4a2a';ctx.lineWidth=1;ctx.stroke();
  var fw=barP.w*p.pct;
  if(fw>3){var eg=ctx.createLinearGradient(barP.x,0,barP.x+fw,0);eg.addColorStop(0,'#22c55e');eg.addColorStop(.5,'#4ade80');eg.addColorStop(1,'#86efac');
    ctx.fillStyle=eg;roundRectPath(ctx,barP.x,barP.y,fw,barP.h,6);ctx.fill();
    ctx.shadowColor='rgba(74,222,128,0.4)';ctx.shadowBlur=6;ctx.fill();ctx.shadowBlur=0}

  // Total EXP
  ctx.fillStyle='#8888aa';ctx.font='10px '+font;ctx.textAlign='right';
  ctx.fillText('Total EXP: '+xp,etp.x+etp.w,etp.y+etp.h/2);ctx.textAlign='left';

  // === Stats row (カード下に追加) ===
  ctx.textBaseline='alphabetic';
  var sY=contentBottom+8;
  ctx.fillStyle='rgba(255,255,255,0.06)';ctx.fillRect(16,sY,W-32,1);sY+=14;
  var stats=[{v:completed().length,l:'総クリア数'},{v:weeklyCount(),l:'今週のクリア'},{v:streakDays(),l:'連続日数'}];
  var stW=(W-32)/3;
  for(var si=0;si<3;si++){var sx=16+stW*si+stW/2;ctx.textAlign='center';
    ctx.fillStyle='#ffd700';ctx.font='bold 18px '+font;ctx.fillText(String(stats[si].v),sx,sY+6);
    ctx.fillStyle='#8888aa';ctx.font='9px '+font;ctx.fillText(stats[si].l,sx,sY+20);
    if(si<2){ctx.fillStyle='rgba(255,255,255,0.08)';ctx.fillRect(16+stW*(si+1),sY-6,1,28)}}
  ctx.textAlign='left';

  // Footer
  ctx.fillStyle='rgba(255,255,255,0.2)';ctx.font='bold 9px '+font;ctx.textAlign='center';ctx.fillText('WORK QUEST',W/2,H-8);ctx.textAlign='left';
  ctx.restore();

// Create a canvas with a chest drawn on it (for task list)
function createChestCanvas(type, size) {
  var canvas = document.createElement("canvas");
  var s = Math.floor(size / 16);
  canvas.width = 16 * s;
  canvas.height = 16 * s;
  canvas.className = "chest-canvas";
  canvas.style.width = size + "px";
  canvas.style.height = size + "px";
  var ctx = canvas.getContext("2d");
  if (type === "quick") { drawChestQuick(ctx, s); }
  else if (type === "short") { drawChestShort(ctx, s); }
  else if (type === "medium") { drawChestMedium(ctx, s); }
  else if (type === "long") { drawChestLong(ctx, s); }
  else if (type === "epic") { drawChestEpic(ctx, s, 0); }
  return canvas;
}

function ls(k,d){try{var v=localStorage.getItem(k);return v?JSON.parse(v):d}catch(e){return d}}
function ss(k,v){localStorage.setItem(k,JSON.stringify(v))}
function gid(){return Date.now().toString(36)+Math.random().toString(36).slice(2,7)}
function tasks(){return ls('wq_tasks',[])}
function completed(){return ls('wq_completed',[])}
function customQuotes(){return ls('wq_custom_quotes',[])}
function allQuotes(){return [].concat(DEFAULT_QUOTES, customQuotes().map(function(q){return {id:q.id,text:q.text,author:q.author,custom:true}}))}
function totalExp(){return completed().reduce(function(s,t){return s+getExp(t.effort)},0)}
function calcLevel(exp){var l=1;for(var i=0;i<LVLS.length;i++){if(exp>=LVLS[i])l=i+1;else break}return l}
function getTitle(lv){var t=TITLES[0][1];for(var i=0;i<TITLES.length;i++){if(lv>=TITLES[i][0])t=TITLES[i][1]}return t}
function getRarity(lv){var r=RARITIES[0];for(var i=0;i<RARITIES.length;i++){if(lv>=RARITIES[i].minLv)r=RARITIES[i]}return r}
function expProgress(lv,exp){
  var cur=LVLS[lv-1]||0,nxt=LVLS[lv]||LVLS[LVLS.length-1]+500;
  var inLv=exp-cur,need=nxt-cur;
  return{inLv:inLv,need:need,pct:need>0?inLv/need:1}
}
function weeklyCount(){
  var now=new Date(),d=now.getDay(),diff=d===0?6:d-1;
  var mon=new Date(now);mon.setDate(now.getDate()-diff);mon.setHours(0,0,0,0);
  return completed().filter(function(t){if(!t.completed_date)return false;return new Date(t.completed_date)>=mon}).length
}
function streakDays(){
  var dates=new Set(completed().map(function(t){return t.completed_date}).filter(Boolean));
  if(!dates.size)return 0;
  var today=new Date();var s=0,check=new Date(today);
  var fmt=function(d){return d.toISOString().split('T')[0]};
  while(dates.has(fmt(check))){s++;check.setDate(check.getDate()-1)}
  if(s===0){check=new Date(today);check.setDate(check.getDate()-1);while(dates.has(fmt(check))){s++;check.setDate(check.getDate()-1)}}
  return s
}

// Party background confetti
var partyParticles = [];
var partyCanvas = null;
var partyCtx = null;
function initPartyBg() {
  var overlay = document.getElementById('charBgOverlay');
  if (!overlay || !overlay.classList.contains('bg-party')) return;
  if (partyCanvas && partyCanvas.parentNode === overlay) return;
  partyCanvas = document.createElement('canvas');
  partyCanvas.width = 300;
  partyCanvas.height = 200;
  partyCanvas.style.cssText = 'position:absolute;top:0;left:0;width:100%;height:100%;pointer-events:none';
  overlay.appendChild(partyCanvas);
  partyCtx = partyCanvas.getContext('2d');
  partyParticles = [];
  var i;
  var colors = ['#ff6b6b','#ffd700','#4ade80','#60a5fa','#a855f7','#ff69b4'];
  for (i = 0; i < 30; i++) {
    partyParticles.push({
      x: Math.random() * 300,
      y: Math.random() * 200,
      vx: (Math.random() - 0.5) * 0.5,
      vy: Math.random() * 0.3 + 0.1,
      size: Math.random() * 3 + 1,
      color: colors[Math.floor(Math.random() * colors.length)],
      rot: Math.random() * 360
    });
  }
}
function animateParty() {
  if (!partyCtx || !partyCanvas) { requestAnimationFrame(animateParty); return; }
  var overlay = document.getElementById('charBgOverlay');
  if (!overlay || !overlay.classList.contains('bg-party')) {
    if (partyCanvas && partyCanvas.parentNode) partyCanvas.parentNode.removeChild(partyCanvas);
    partyCanvas = null; partyCtx = null;
    requestAnimationFrame(animateParty); return;
  }
  partyCtx.clearRect(0, 0, 300, 200);
  var i;
  for (i = 0; i < partyParticles.length; i++) {
    var pp = partyParticles[i];
    pp.x += pp.vx;
    pp.y += pp.vy;
    pp.rot += 2;
    if (pp.y > 200) { pp.y = -5; pp.x = Math.random() * 300; }
    if (pp.x < 0) pp.x = 300;
    if (pp.x > 300) pp.x = 0;
    partyCtx.save();
    partyCtx.translate(pp.x, pp.y);
    partyCtx.rotate(pp.rot * Math.PI / 180);
    partyCtx.fillStyle = pp.color;
    partyCtx.globalAlpha = 0.6;
    partyCtx.fillRect(-pp.size / 2, -pp.size / 2, pp.size, pp.size * 0.6);
    partyCtx.restore();
  }
  requestAnimationFrame(animateParty);
}
requestAnimationFrame(animateParty);

  }

  // Apply equipped background overlay

  // Gacha tickets UI

function completeQuest(){
  if(!selQuestId)return;
  var t=tasks(),idx=-1;
  var i;
  for(i=0;i<t.length;i++){if(t[i].id===selQuestId){idx=i;break}}
  if(idx<0)return;
  var q=t.splice(idx,1)[0];
  var prevLv=calcLevel(totalExp());
  var d=completed();
  q.completed_date=new Date().toISOString().split('T')[0];
  d.push(q);
  ss('wq_tasks',t);ss('wq_completed',d);
  var newLv=calcLevel(totalExp());
  var xp=getExp(q.effort);

  // Calculate ticket reward
  var chestDef=CHEST_TYPES[q.effort]||CHEST_TYPES.medium;
  var ticketEarned=0;
  if(chestDef.ticketChance>=1){
    ticketEarned=chestDef.ticket;
  } else if(chestDef.ticketChance>0){
    if(Math.random()<chestDef.ticketChance){ticketEarned=chestDef.ticket}
  }
  // Level up bonus tickets
  var lvlUpTickets=0;
  if(newLv>prevLv){lvlUpTickets=newLv-prevLv}

  var totalTickets=ticketEarned+lvlUpTickets;
  if(totalTickets>0){
    var curTickets=gachaTickets();
    setGachaTickets(curTickets+totalTickets);
  }

  closeModal('detailModal');

  // Show chest open overlay
  chestTaskEffort=q.effort;
  chestTaskExp=xp;
  chestTicketReward=ticketEarned;
  chestState=0;
  showChestOverlay(q.effort, xp, ticketEarned, newLv>prevLv, newLv, lvlUpTickets);
}

// === CHEST OPEN OVERLAY ===
var chestOverlayNewLv=0;
var chestOverlayLvlUp=false;
var chestOverlayLvlUpTickets=0;

function showChestOverlay(effort, xp, tickets, lvlUp, newLv, lvlUpTickets){
  chestOverlayLvlUp=lvlUp;
  chestOverlayNewLv=newLv;
  chestOverlayLvlUpTickets=lvlUpTickets;

  var overlay=document.getElementById('chestOverlay');
  var canvas=document.getElementById('chestBigCanvas');
  var ctx=canvas.getContext('2d');
  var bigScale=8; // 16*8=128
  canvas.width=16*bigScale;
  canvas.height=16*bigScale;
  canvas.style.width='128px';
  canvas.style.height='128px';
  ctx.clearRect(0,0,canvas.width,canvas.height);

  // Draw closed chest
  if(effort==='quick'){drawChestQuick(ctx,bigScale)}
  else if(effort==='short'){drawChestShort(ctx,bigScale)}
  else if(effort==='medium'){drawChestMedium(ctx,bigScale)}
  else if(effort==='long'){drawChestLong(ctx,bigScale)}
  else if(effort==='epic'){drawChestEpic(ctx,bigScale,0)}

  document.getElementById('chestTapHint').textContent='タップして開ける';
  document.getElementById('chestTapHint').style.display='block';
  document.getElementById('chestReward').classList.remove('show');
  document.getElementById('chestReward').textContent='';
  document.getElementById('chestTicketReward').classList.remove('show');
  document.getElementById('chestTicketReward').textContent='';
  document.getElementById('chestCloseBtn').style.display='none';
  chestState=0;
  overlay.classList.add('open');

  // Play chest appear sound
  playSound(220,0.1,'sine');

  // Set up tap
  canvas.onclick=function(){handleChestTap()};
  overlay.onclick=function(e){if(e.target===overlay&&chestState===2)closeChestOverlay()};
}

function handleChestTap(){
  if(chestState!==0)return;
  chestState=1;

  var canvas=document.getElementById('chestBigCanvas');
  var ctx=canvas.getContext('2d');
  var bigScale=8;

  // Play chest open sound
  playSound(440,0.15,'square');
  setTimeout(function(){playSound(660,0.15,'square')},80);
  setTimeout(function(){playSound(880,0.2,'sine')},160);
  setTimeout(function(){playSound(1100,0.15,'sine')},280);

  // Animate: lid jump up then show open chest
  document.getElementById('chestTapHint').style.display='none';

  // Quick animation: clear and redraw as open
  setTimeout(function(){
    ctx.clearRect(0,0,canvas.width,canvas.height);
    drawChestOpen(ctx,bigScale,chestTaskEffort);

    // Epic: gold flash
    if(chestTaskEffort==='epic'){
      var flash=document.getElementById('chestGoldFlash');
      flash.classList.remove('show');
      void flash.offsetWidth;
      flash.classList.add('show');
    }

    // Show EXP reward
    var rewardEl=document.getElementById('chestReward');
    rewardEl.textContent='+'+chestTaskExp+' EXP!';
    rewardEl.classList.remove('show');
    void rewardEl.offsetWidth;
    rewardEl.classList.add('show');

    // Show ticket reward
    if(chestTicketReward>0){
      var ticketEl=document.getElementById('chestTicketReward');
      ticketEl.textContent='🎫 チケット x'+chestTicketReward+' GET!';
      ticketEl.classList.remove('show');
      void ticketEl.offsetWidth;
      ticketEl.classList.add('show');
    }

    chestState=2;

    // Show close button after a moment
    setTimeout(function(){
      document.getElementById('chestCloseBtn').style.display='inline-block';

      // If level up, show after chest rewards
      if(chestOverlayLvlUp){
        setTimeout(function(){
          showLevelUp(chestOverlayNewLv);
          if(chestOverlayLvlUpTickets>0){
            setTimeout(function(){showToast('🎫 レベルUPボーナス +'+chestOverlayLvlUpTickets+'枚!')},1800);
          }
        },500);
      }
    },800);

  },300);
}

function closeChestOverlay(){
  document.getElementById('chestOverlay').classList.remove('open');
  chestState=0;
  render();
}

function deleteQuest(){
  if(!selQuestId)return;
  if(!confirm('このタスクを削除しますか？'))return;
  var t=tasks().filter(function(q){return q.id!==selQuestId});
  ss('wq_tasks',t);
  closeModal('detailModal');
  render();
}

function showToast(msg){
  var el=document.getElementById('toast');
  el.textContent=msg;el.classList.remove('show');
  void el.offsetWidth;el.classList.add('show');
}
function showLevelUp(lv){
  showToast('LEVEL UP! Lv.'+lv+' '+getTitle(lv));
  var el=document.getElementById('lvlup');
  el.classList.remove('show');void el.offsetWidth;el.classList.add('show');
  playSound(660,0.3,'sine');
  setTimeout(function(){playSound(880,0.3,'sine')},150);
  setTimeout(function(){playSound(1100,0.4,'sine')},300);
}
function showExpFloat(xp){
  var el=document.getElementById('expFloat');
  el.textContent='+'+xp+' EXP';
  el.style.left='50%';el.style.top='45%';el.style.transform='translateX(-50%)';
  el.classList.remove('show');void el.offsetWidth;el.classList.add('show');
}

function playSound(freq,dur,type){
  try{
    var ctx=new(window.AudioContext||window.webkitAudioContext)();
    var osc=ctx.createOscillator();var gain=ctx.createGain();
    osc.type=type||'sine';osc.frequency.value=freq;
    gain.gain.value=0.08;gain.gain.exponentialRampToValueAtTime(0.001,ctx.currentTime+dur);
    osc.connect(gain);gain.connect(ctx.destination);
    osc.start();osc.stop(ctx.currentTime+dur);
  }catch(e){}
}

// === GACHA SYSTEM ===
function rollGacha(){
  var r=Math.random()*100;
  var rarity;
  if(r<5) rarity='SSR';
  else if(r<20) rarity='SR';
  else if(r<50) rarity='R';
  else rarity='N';

  var pool=GACHA_ITEMS.filter(function(item){return item.rarity===rarity});
  if(!pool.length) pool=GACHA_ITEMS.filter(function(item){return item.rarity==='N'});
  var item=pool[Math.floor(Math.random()*pool.length)];
  return item;
}

function openGachaModal(){
  var tickets=gachaTickets();
  if(tickets<=0)return;
  setGachaTickets(tickets-1);
  lastDrawnItem=rollGacha();
  gachaState=0;
  var inner=document.getElementById('gachaCardInner');
  inner.classList.remove('flipped');
  document.getElementById('gachaCloseBtn').style.display='none';
  document.getElementById('gachaTapHint').textContent='タップでカードを開く';

  var back=document.getElementById('gachaCardBack');
  back.className='gacha-card-back gacha-rarity-'+lastDrawnItem.rarity.toLowerCase();
  document.getElementById('gachaRarityLabel').textContent=lastDrawnItem.rarity;
  document.getElementById('gachaItemName').textContent=lastDrawnItem.name;
  var typeLabels={frame:'フレーム装飾',title:'称号',bg:'背景エフェクト'};
  document.getElementById('gachaItemType').textContent=typeLabels[lastDrawnItem.type]||'';
  document.getElementById('gachaItemPreview').textContent=lastDrawnItem.icon||'?';

  document.getElementById('gachaDrawModal').classList.add('open');
  playSound(330,0.1,'sine');
  setTimeout(function(){playSound(440,0.1,'sine')},100);
}

function handleGachaTap(){
  if(gachaState===0){
    gachaState=1;
    var inner=document.getElementById('gachaCardInner');
    inner.classList.add('flipped');

    var flash=document.getElementById('gachaFlash');
    flash.className='gacha-flash';
    void flash.offsetWidth;
    if(lastDrawnItem.rarity==='SSR'){
      flash.classList.add('show-ssr');
      playSound(880,0.4,'sine');
      setTimeout(function(){playSound(1100,0.3,'sine')},200);
      setTimeout(function(){playSound(1320,0.5,'sine')},400);
    } else if(lastDrawnItem.rarity==='SR'){
      flash.classList.add('show-sr');
      playSound(660,0.3,'sine');
      setTimeout(function(){playSound(880,0.3,'sine')},200);
    } else if(lastDrawnItem.rarity==='R'){
      flash.classList.add('show-r');
      playSound(550,0.2,'sine');
    } else {
      flash.classList.add('show-n');
      playSound(440,0.15,'sine');
    }

    addGachaItem(lastDrawnItem);

    setTimeout(function(){
      gachaState=2;
      document.getElementById('gachaCloseBtn').style.display='inline-block';
      document.getElementById('gachaTapHint').textContent='';
    },900);

  } else if(gachaState===2){
    closeGacha();
  }
}

function closeGacha(){
  document.getElementById('gachaDrawModal').classList.remove('open');
  gachaState=0;
  lastDrawnItem=null;
  render();
}

// === COLLECTION ===
function switchCollTab(tab,el){
  currentCollTab=tab;
  var tabs=document.querySelectorAll('.coll-tab');
  var i;
  for(i=0;i<tabs.length;i++){tabs[i].classList.remove('active')}
  el.classList.add('active');
  renderCollection();
}

function renderCollection(){
  var grid=document.getElementById('collGrid');
  var owned=gachaItems();
  var eq=getEquipped();
  var tab=currentCollTab;

  var ownedIds={};
  var oi;
  for(oi=0;oi<owned.length;oi++){
    if(owned[oi].type===tab) ownedIds[owned[oi].id]=true;
  }

  var items=GACHA_ITEMS.filter(function(item){return item.type===tab&&ownedIds[item.id]});

  if(!items.length){
    grid.innerHTML='<div class="coll-empty">まだアイテムがありません<br>ガチャを引いてコレクションしよう</div>';
    return;
  }

  var rarityOrder={SSR:0,SR:1,R:2,N:3};
  items.sort(function(a,b){return (rarityOrder[a.rarity]||99)-(rarityOrder[b.rarity]||99)});

  var equippedId=eq[tab]||null;

  grid.innerHTML=items.map(function(item){
    var isEquipped=equippedId===item.id;
    var rarClass='r'+item.rarity;
    return '<div class="coll-item'+(isEquipped?' equipped':'')+'" onclick="toggleEquip(\''+item.type+'\',\''+item.id+'\')"><div class="ci-icon">'+item.icon+'</div><div class="ci-name">'+esc(item.name)+'</div><div class="ci-rarity '+rarClass+'">'+item.rarity+'</div></div>';
  }).join('');
}

function toggleEquip(type,id){
  var eq=getEquipped();
  if(eq[type]===id){eq[type]=null} else {eq[type]=id}
  setEquipped(eq);
  renderCollection();
  render();
}

// === QUOTES ===
function renderQuoteList(){
  var list=document.getElementById('quoteList');
  var qs=allQuotes();
  list.innerHTML=qs.map(function(q){
    var del=q.custom?'<button class="qdel" onclick="delQuote(\''+q.id+'\')">削除</button>':'<span class="qdefault">デフォルト</span>';
    return '<div class="qlist-item"><div style="flex:1"><div class="qtxt">'+esc(q.text)+'</div><div class="qauth">-- '+esc(q.author||'不明')+'</div></div>'+del+'</div>'
  }).join('')
}

function addCustomQuote(){
  var text=document.getElementById('newQuoteTxt').value.trim();
  if(!text)return;
  var author=document.getElementById('newQuoteAuth').value.trim()||'自分';
  var qs=customQuotes();
  qs.push({id:gid(),text:text,author:author});
  ss('wq_custom_quotes',qs);
  document.getElementById('newQuoteTxt').value='';
  document.getElementById('newQuoteAuth').value='';
  closeModal('addQuoteModal');
  renderQuoteList();
  showToast('名言追加!');
}

function delQuote(id){
  if(!confirm('この名言を削除しますか？'))return;
  var qs=customQuotes().filter(function(q){return q.id!==id});
  ss('wq_custom_quotes',qs);
  renderQuoteList();
}
